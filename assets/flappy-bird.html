<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Flappy Bird</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #fafbfc;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
      "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    -webkit-user-select: none;
    user-select: none;
  }
  #game {
    display: block;
    margin: 0 auto;
    height: 100%;
    touch-action: manipulation;
    cursor: pointer;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
(function () {
  "use strict";

  var canvas = document.getElementById("game");
  var ctx = canvas.getContext("2d");

  /* Logical size; canvas scales to fit the frame while keeping the ratio. */
  var W = 320;
  var H = 480;

  var COLORS = {
    skyTop: "#dff3f1",
    skyBottom: "#f6fbfa",
    bird: "#0f766e",
    birdBelly: "#5eead4",
    beak: "#f59e0b",
    pipe: "#14b8a6",
    pipeDark: "#0f766e",
    ground: "#e3e8ed",
    groundLine: "#cfd7de",
    text: "#1c2733",
    faint: "#5c6b7a"
  };

  var GRAVITY = 1350;      /* px/s^2 */
  var FLAP_VY = -380;      /* px/s */
  var PIPE_SPEED = 130;    /* px/s */
  var PIPE_GAP = 130;
  var PIPE_W = 52;
  var PIPE_SPACING = 190;  /* horizontal distance between pipes */
  var GROUND_H = 56;
  var BIRD_X = 84;
  var BIRD_R = 12;

  var STORAGE_KEY = "flappy-best-score";

  var state = "ready";     /* ready | playing | dead */
  var birdY, birdVY, pipes, score, best, groundOffset, deadTime;

  try {
    best = parseInt(localStorage.getItem(STORAGE_KEY), 10) || 0;
  } catch (e) {
    best = 0;
  }

  function reset() {
    birdY = H * 0.45;
    birdVY = 0;
    pipes = [];
    score = 0;
    groundOffset = 0;
    var x = W + 120;
    for (var i = 0; i < 3; i++) {
      pipes.push(makePipe(x));
      x += PIPE_SPACING;
    }
  }

  function makePipe(x) {
    var margin = 56;
    var gapY = margin + Math.random() * (H - GROUND_H - margin * 2 - PIPE_GAP);
    return { x: x, gapY: gapY, passed: false };
  }

  function flap() {
    if (state === "ready") {
      state = "playing";
      birdVY = FLAP_VY;
    } else if (state === "playing") {
      birdVY = FLAP_VY;
    } else if (state === "dead") {
      /* Small delay so a tap on the death frame doesn't instantly restart */
      if (performance.now() - deadTime > 400) {
        reset();
        state = "ready";
      }
    }
  }

  function die() {
    state = "dead";
    deadTime = performance.now();
    if (score > best) {
      best = score;
      try {
        localStorage.setItem(STORAGE_KEY, String(best));
      } catch (e) { /* private mode etc. */ }
    }
  }

  function update(dt) {
    groundOffset = (groundOffset + PIPE_SPEED * dt) % 24;

    if (state !== "playing") {
      if (state === "ready") {
        /* Idle bobbing */
        birdY = H * 0.45 + Math.sin(performance.now() / 300) * 6;
      }
      return;
    }

    birdVY += GRAVITY * dt;
    birdY += birdVY * dt;

    /* Ceiling is soft, ground is deadly */
    if (birdY < BIRD_R) {
      birdY = BIRD_R;
      birdVY = 0;
    }
    if (birdY > H - GROUND_H - BIRD_R) {
      birdY = H - GROUND_H - BIRD_R;
      die();
      return;
    }

    for (var i = 0; i < pipes.length; i++) {
      var p = pipes[i];
      p.x -= PIPE_SPEED * dt;

      if (!p.passed && p.x + PIPE_W < BIRD_X - BIRD_R) {
        p.passed = true;
        score++;
      }

      /* Collision (circle vs the two pipe rects) */
      if (BIRD_X + BIRD_R > p.x && BIRD_X - BIRD_R < p.x + PIPE_W) {
        if (birdY - BIRD_R < p.gapY || birdY + BIRD_R > p.gapY + PIPE_GAP) {
          die();
          return;
        }
      }
    }

    if (pipes[0].x + PIPE_W < 0) {
      pipes.shift();
      pipes.push(makePipe(pipes[pipes.length - 1].x + PIPE_SPACING));
    }
  }

  function drawBackground() {
    var sky = ctx.createLinearGradient(0, 0, 0, H - GROUND_H);
    sky.addColorStop(0, COLORS.skyTop);
    sky.addColorStop(1, COLORS.skyBottom);
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H - GROUND_H);
  }

  function drawPipes() {
    for (var i = 0; i < pipes.length; i++) {
      var p = pipes[i];
      ctx.fillStyle = COLORS.pipe;
      /* top pipe */
      ctx.fillRect(p.x, 0, PIPE_W, p.gapY);
      /* bottom pipe */
      ctx.fillRect(p.x, p.gapY + PIPE_GAP, PIPE_W, H - GROUND_H - p.gapY - PIPE_GAP);
      /* lips */
      ctx.fillStyle = COLORS.pipeDark;
      ctx.fillRect(p.x - 3, p.gapY - 14, PIPE_W + 6, 14);
      ctx.fillRect(p.x - 3, p.gapY + PIPE_GAP, PIPE_W + 6, 14);
    }
  }

  function drawGround() {
    ctx.fillStyle = COLORS.ground;
    ctx.fillRect(0, H - GROUND_H, W, GROUND_H);
    ctx.strokeStyle = COLORS.groundLine;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, H - GROUND_H + 1);
    ctx.lineTo(W, H - GROUND_H + 1);
    ctx.stroke();
    /* moving stripes */
    ctx.fillStyle = COLORS.groundLine;
    for (var x = -24 + (24 - groundOffset); x < W + 24; x += 24) {
      ctx.fillRect(x, H - GROUND_H + 10, 12, 4);
    }
  }

  function drawBird() {
    var tilt = state === "playing" || state === "dead"
      ? Math.max(-0.5, Math.min(1.1, birdVY / 500))
      : 0;
    ctx.save();
    ctx.translate(BIRD_X, birdY);
    ctx.rotate(tilt);
    /* body */
    ctx.fillStyle = COLORS.bird;
    ctx.beginPath();
    ctx.arc(0, 0, BIRD_R, 0, Math.PI * 2);
    ctx.fill();
    /* belly */
    ctx.fillStyle = COLORS.birdBelly;
    ctx.beginPath();
    ctx.arc(-2, 4, BIRD_R * 0.55, 0, Math.PI * 2);
    ctx.fill();
    /* eye */
    ctx.fillStyle = "#ffffff";
    ctx.beginPath();
    ctx.arc(5, -4, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = COLORS.text;
    ctx.beginPath();
    ctx.arc(6, -4, 2, 0, Math.PI * 2);
    ctx.fill();
    /* beak */
    ctx.fillStyle = COLORS.beak;
    ctx.beginPath();
    ctx.moveTo(BIRD_R - 2, -1);
    ctx.lineTo(BIRD_R + 7, 2);
    ctx.lineTo(BIRD_R - 2, 5);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function drawUI() {
    ctx.textAlign = "center";
    ctx.fillStyle = COLORS.text;

    if (state === "playing") {
      ctx.font = "bold 34px sans-serif";
      ctx.fillText(String(score), W / 2, 64);
      return;
    }

    if (state === "ready") {
      ctx.font = "bold 22px sans-serif";
      ctx.fillText("Flappy Bird", W / 2, H * 0.28);
      ctx.font = "14px sans-serif";
      ctx.fillStyle = COLORS.faint;
      ctx.fillText("点击 / 空格键 起飞", W / 2, H * 0.28 + 28);
      if (best > 0) {
        ctx.fillText("最高分 " + best, W / 2, H * 0.28 + 50);
      }
      return;
    }

    /* dead */
    ctx.fillStyle = "rgba(28, 39, 51, 0.55)";
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 24px sans-serif";
    ctx.fillText("游戏结束", W / 2, H * 0.36);
    ctx.font = "16px sans-serif";
    ctx.fillText("得分 " + score + "　·　最高分 " + best, W / 2, H * 0.36 + 34);
    ctx.font = "14px sans-serif";
    ctx.fillText("点击 / 空格键 重新开始", W / 2, H * 0.36 + 64);
  }

  function draw() {
    drawBackground();
    drawPipes();
    drawGround();
    drawBird();
    drawUI();
  }

  /* Fit canvas to window while keeping the logical aspect ratio crisp. */
  function resize() {
    var scale = Math.min(window.innerWidth / W, window.innerHeight / H);
    var dpr = window.devicePixelRatio || 1;
    canvas.style.width = W * scale + "px";
    canvas.style.height = H * scale + "px";
    canvas.width = Math.round(W * scale * dpr);
    canvas.height = Math.round(H * scale * dpr);
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
  }

  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 1000, 1 / 30);
    last = now;
    update(dt);
    draw();
    requestAnimationFrame(frame);
  }

  canvas.addEventListener("pointerdown", function (e) {
    e.preventDefault();
    flap();
  });
  window.addEventListener("keydown", function (e) {
    if (e.code === "Space" || e.code === "ArrowUp") {
      e.preventDefault();
      flap();
    }
  });
  window.addEventListener("resize", resize);

  resize();
  reset();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
